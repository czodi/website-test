<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Focus | Mobile Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --accent-primary: #3b82f6;
            --accent-secondary: #06b6d4;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 15% 15%, var(--accent-primary), transparent 40%),
                radial-gradient(circle at 85% 85%, var(--accent-secondary), transparent 40%);
            opacity: 0.15;
            transition: all 0.8s ease;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        /* Navigation Responsive */
        .nav-container {
            position: fixed;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            display: flex;
            transition: all 0.3s ease;
        }

        /* Desktop Sidebar */
        @media (min-width: 768px) {
            .nav-container {
                width: 80px;
                height: calc(100vh - 32px);
                margin: 16px;
                border-radius: 24px;
                flex-direction: column;
                align-items: center;
                padding: 28px 0;
                gap: 20px;
                left: 0;
            }
            .main-container { margin-left: 112px; }
        }

        /* Mobile Bottom Bar */
        @media (max-width: 767px) {
            .nav-container {
                bottom: 12px;
                left: 12px;
                right: 12px;
                height: 70px;
                border-radius: 20px;
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                padding: 0 10px;
                padding-bottom: var(--safe-area-bottom);
                box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
            }
            .main-container { margin-bottom: 90px; padding: 24px 20px; }
            .desktop-only { display: none; }
        }

        .nav-item {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .nav-item.active { 
            color: white; 
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transform: translateY(-5px);
        }

        .main-container { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        .liquid-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }

        .view-content { display: none; animation: fadeIn 0.4s ease; }
        .view-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grille Adaptative */
        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            position: relative;
        }

        .app-icon {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        
        .app-icon-wrapper:active .app-icon { transform: scale(0.9); }

        .app-icon img { width: 38px; height: 38px; object-fit: contain; }
        .app-icon .emoji-display { font-size: 32px; }

        .app-label {
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .icon-actions {
            position: absolute;
            top: -4px;
            right: -4px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }
        
        .action-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-del { background: #dc2626; }

        /* Search Bar */
        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 16px 12px 44px;
            color: white;
            font-size: 16px; 
        }

        /* Thèmes Swatches */
        .theme-swatch {
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
        }
        .theme-swatch.active { border-color: white; }

        /* Notification Toast */
        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -100px);
            padding: 12px 20px;
            border-radius: 12px;
            background: var(--accent-primary);
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        #notification.show { transform: translate(-50%, 0); }

        input, select, button {
            font-size: 16px !important;
        }
    </style>
</head>
<body>
    <div class="bg-glow" id="dynamicBg"></div>
    <div id="notification"><span>Message</span></div>
    
    <nav class="nav-container">
        <div class="desktop-only mb-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[var(--accent-primary)] to-[var(--accent-secondary)] flex items-center justify-center">
                <svg viewBox="0 0 24 24" class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            </div>
        </div>
        <div class="nav-item active" data-view="home" onclick="switchView('home')">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
        </div>
        <div class="nav-item" data-view="tasks" onclick="switchView('tasks')">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        </div>
        <div class="nav-item" data-view="settings" onclick="switchView('settings')">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
        </div>
    </nav>

    <main class="main-container">
        <!-- VUE : ACCUEIL -->
        <section id="view-home" class="view-content active">
            <header class="mb-8 flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <h1 id="greetingText" class="text-4xl md:text-6xl font-semibold text-white tracking-tight">Bonjour.</h1>
                    <button onclick="openModal()" class="bg-[var(--accent-primary)] w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v12m6-6H6"/></svg>
                    </button>
                </div>
                <p class="text-slate-400 font-light text-sm md:text-lg">Vos liens favoris en un clin d'œil.</p>
            </header>

            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <div class="relative flex-1">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" oninput="renderHome()" placeholder="Rechercher..." class="search-input">
                </div>
                <select id="sortSelect" onchange="renderHome()" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-300 outline-none">
                    <option value="name_asc">Nom A-Z</option>
                    <option value="date_new">Nouveautés</option>
                </select>
            </div>

            <div id="homeGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-9 gap-x-4 gap-y-8 pb-10"></div>
        </section>

        <!-- VUE : TÂCHES -->
        <section id="view-tasks" class="view-content">
            <h1 class="text-4xl font-semibold text-white mb-2">Objectifs</h1>
            <p id="dateLabel" class="text-slate-500 text-sm mb-8"></p>
            
            <div class="liquid-card p-2 flex gap-2 mb-8">
                <input type="text" id="taskInput" placeholder="Nouvelle tâche..." class="flex-1 px-4 py-3 bg-transparent outline-none text-white">
                <button onclick="addTask()" class="bg-[var(--accent-primary)] w-12 h-12 rounded-xl flex items-center justify-center text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v12m6-6H6"/></svg>
                </button>
            </div>
            
            <div id="taskList" class="space-y-3"></div>
        </section>

        <!-- VUE : PARAMÈTRES -->
        <section id="view-settings" class="view-content">
            <h1 class="text-4xl font-semibold text-white mb-8">Réglages</h1>
            
            <div class="space-y-10">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Profil -->
                    <div class="liquid-card p-6">
                        <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4">Votre Prénom</h3>
                        <input type="text" id="userNameInput" oninput="updateUserName(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none text-sm" placeholder="Ex: Jean">
                    </div>
                    <!-- Thème -->
                    <div class="liquid-card p-6">
                        <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4">Personnalisation</h3>
                        <div class="grid grid-cols-5 gap-2">
                            <div onclick="setTheme('#020617', '#3b82f6', '#06b6d4', 'blue')" class="theme-swatch bg-blue-600"></div>
                            <div onclick="setTheme('#0a0208', '#d946ef', '#701a75', 'pink')" class="theme-swatch bg-pink-600"></div>
                            <div onclick="setTheme('#0c0a02', '#eab308', '#92400e', 'yellow')" class="theme-swatch bg-yellow-600"></div>
                            <div onclick="setTheme('#0c0202', '#ef4444', '#7f1d1d', 'red')" class="theme-swatch bg-red-600"></div>
                            <div onclick="setTheme('#020c08', '#10b981', '#064e3b', 'green')" class="theme-swatch bg-emerald-600"></div>
                        </div>
                    </div>
                    <!-- Data -->
                    <div class="liquid-card p-6 flex flex-col justify-center gap-3">
                        <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Sauvegarde</h3>
                        <div class="flex gap-2">
                            <button onclick="exportData()" class="flex-1 py-2 bg-white/5 rounded-lg text-[11px] font-bold border border-white/10">Export</button>
                            <label class="flex-1 py-2 bg-white/5 rounded-lg text-[11px] font-bold border border-white/10 text-center cursor-pointer">
                                Import
                                <input type="file" class="hidden" accept=".json" onchange="importData(event)">
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="bookmarkModal" class="fixed inset-0 bg-black/95 z-[2000] hidden flex items-end md:items-center justify-center">
        <div class="liquid-card w-full max-w-lg p-6 md:p-10 rounded-t-3xl md:rounded-3xl border-b-0 md:border-b">
            <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6 md:hidden"></div>
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold">Ajouter un lien</h2>
                <button onclick="closeModal()" class="p-2 text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            
            <div class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="bmName" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none" placeholder="Nom">
                <input type="text" id="bmUrl" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none" placeholder="URL (ex: google.com)">
                
                <div class="flex gap-2 p-1 bg-white/5 rounded-xl w-full">
                    <button onclick="setIconMode('auto')" id="tab-auto" class="flex-1 py-2 text-xs font-bold rounded-lg transition active">Auto</button>
                    <button onclick="setIconMode('emoji')" id="tab-emoji" class="flex-1 py-2 text-xs font-bold rounded-lg transition">Emoji</button>
                    <button onclick="setIconMode('url')" id="tab-url" class="flex-1 py-2 text-xs font-bold rounded-lg transition">URL</button>
                </div>
                
                <div id="iconInputContainer" class="hidden">
                    <input type="text" id="bmIconValue" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none" placeholder="Emoji ou URL Image">
                </div>

                <button onclick="confirmBookmark()" class="w-full py-4 bg-[var(--accent-primary)] rounded-xl font-bold text-white shadow-lg mt-4">Enregistrer</button>
            </div>
        </div>
    </div>

    <script>
        let bookmarks = JSON.parse(localStorage.getItem('fish_bookmarks')) || [];
        let tasks = JSON.parse(localStorage.getItem('fish_tasks')) || [];
        let userName = localStorage.getItem('fish_user_name') || "";
        let currentIconMode = 'auto';

        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.querySelector('span').textContent = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            let greet = hour < 18 ? "Bonjour" : "Bonsoir";
            document.getElementById('greetingText').textContent = userName ? `${greet}, ${userName}` : `${greet}.`;
        }

        function updateUserName(val) {
            userName = val.trim();
            localStorage.setItem('fish_user_name', userName);
            updateGreeting();
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('active');
                if(n.dataset.view === viewId) n.classList.add('active');
            });
            document.querySelector('.main-container').scrollTop = 0;
        }

        function setTheme(bg, acc1, acc2, name) {
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--accent-primary', acc1);
            document.documentElement.style.setProperty('--accent-secondary', acc2);
            localStorage.setItem('fish_theme', JSON.stringify({bg, acc1, acc2, name}));
            renderHome();
        }

        function setIconMode(mode) {
            currentIconMode = mode;
            document.querySelectorAll('#bookmarkModal button[id^="tab-"]').forEach(t => t.classList.remove('bg-white/10', 'active'));
            document.getElementById(`tab-${mode}`).classList.add('bg-white/10', 'active');
            document.getElementById('iconInputContainer').classList.toggle('hidden', mode === 'auto');
        }

        function openModal() {
            document.getElementById('bookmarkModal').classList.remove('hidden');
            document.getElementById('editId').value = "";
            document.getElementById('bmName').value = "";
            document.getElementById('bmUrl').value = "";
            document.getElementById('bmIconValue').value = "";
            setIconMode('auto');
        }

        function closeModal() { document.getElementById('bookmarkModal').classList.add('hidden'); }

        function confirmBookmark() {
            const name = document.getElementById('bmName').value;
            let url = document.getElementById('bmUrl').value;
            const iconValue = document.getElementById('bmIconValue').value;

            if(name && url) {
                if(!url.startsWith('http')) url = 'https://' + url;
                bookmarks.push({ id: Date.now(), name, url, iconMode: currentIconMode, iconValue, date: Date.now() });
                localStorage.setItem('fish_bookmarks', JSON.stringify(bookmarks));
                renderHome();
                closeModal();
            }
        }

        function renderHome() {
            const grid = document.getElementById('homeGrid');
            const query = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            bookmarks.filter(b => b.name.toLowerCase().includes(query)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'app-icon-wrapper';
                div.onclick = () => window.open(item.url, '_blank');
                
                const initial = item.name[0]?.toUpperCase() || '?';
                let iconHtml = '';

                if (item.iconMode === 'emoji' && item.iconValue) {
                    iconHtml = `<span class="emoji-display">${item.iconValue}</span>`;
                } else if (item.iconMode === 'url' && item.iconValue) {
                    iconHtml = `<img src="${item.iconValue}" onerror="this.src='https://www.google.com/s2/favicons?domain=${new URL(item.url).hostname}&sz=128'">`;
                } else {
                    iconHtml = `<img src="https://www.google.com/s2/favicons?domain=${new URL(item.url).hostname}&sz=128" onerror="this.parentElement.innerHTML='<span class=\'text-2xl font-bold\'>${initial}</span>'">`;
                }

                div.innerHTML = `
                    <div class="icon-actions">
                        <button onclick="event.stopPropagation(); deleteBookmark(${item.id})" class="action-btn btn-del">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <div class="app-icon">${iconHtml}</div>
                    <div class="app-label">${item.name}</div>
                `;
                grid.appendChild(div);
            });
        }

        function deleteBookmark(id) {
            bookmarks = bookmarks.filter(b => b.id !== id);
            localStorage.setItem('fish_bookmarks', JSON.stringify(bookmarks));
            renderHome();
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if(input.value) {
                tasks.push({id: Date.now(), text: input.value, done: false});
                input.value = '';
                localStorage.setItem('fish_tasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(t => {
                const div = document.createElement('div');
                div.className = `liquid-card p-4 flex items-center justify-between ${t.done ? 'opacity-50' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3" onclick="toggleTask(${t.id})">
                        <div class="w-6 h-6 rounded-full border-2 border-[var(--accent-primary)] flex items-center justify-center">
                            ${t.done ? '<div class="w-3 h-3 bg-[var(--accent-primary)] rounded-full"></div>' : ''}
                        </div>
                        <span class="text-sm ${t.done ? 'line-through' : 'text-white'}">${t.text}</span>
                    </div>
                    <button onclick="deleteTask(${t.id})" class="text-slate-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
                `;
                list.appendChild(div);
            });
        }

        function toggleTask(id) {
            const t = tasks.find(x => x.id === id);
            if(t) t.done = !t.done;
            localStorage.setItem('fish_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('fish_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function exportData() {
            const data = { bookmarks, tasks, userName };
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "fish-focus-data.json";
            a.click();
            showNotification("Données exportées !");
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = JSON.parse(event.target.result);
                if(data.bookmarks) bookmarks = data.bookmarks;
                if(data.tasks) tasks = data.tasks;
                if(data.userName) userName = data.userName;
                localStorage.setItem('fish_bookmarks', JSON.stringify(bookmarks));
                localStorage.setItem('fish_tasks', JSON.stringify(tasks));
                localStorage.setItem('fish_user_name', userName);
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        window.onload = () => {
            const t = JSON.parse(localStorage.getItem('fish_theme')) || {bg: '#020617', acc1: '#3b82f6', acc2: '#06b6d4', name: 'blue'};
            setTheme(t.bg, t.acc1, t.acc2, t.name);
            document.getElementById('userNameInput').value = userName;
            const now = new Date();
            document.getElementById('dateLabel').textContent = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            updateGreeting();
            renderHome();
            renderTasks();
        };
    </script>
</body>
</html>
